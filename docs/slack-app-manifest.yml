display_information:
  name: clausifai-agent
  description: Slack-native operations agent for founder workflows
features:
  bot_user:
    display_name: clausifai-agent
    always_online: false
  slash_commands:
    - command: /ops-digest
      description: Build and post the latest email triage digest
      usage_hint: ""
      should_escape: false
    - command: /ops-next
      description: Show upcoming meetings with context
      usage_hint: ""
      should_escape: false
oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - commands
      - channels:history
      - channels:read
settings:
  interactivity:
    is_enabled: true
    request_url: https://your-agent-host/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
